apiVersion: apps/v1
kind: Deployment
metadata:
  name: khasino-backend
  namespace: khasino
  labels:
    app: khasino
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: khasino
      component: backend
  template:
    metadata:
      labels:
        app: khasino
        component: backend
    spec:
      containers:
      - name: backend
        image: khasino/backend:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: khasino-secrets
              key: db-host
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: khasino-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: khasino-secrets
              key: db-password
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: khasino-config
              key: redis-host
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: khasino-secrets
              key: jwt-secret
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: khasino-secrets
              key: jwt-refresh-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: khasino-backend
  namespace: khasino
spec:
  selector:
    app: khasino
    component: backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer
